<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #222);
            min-height: 100vh;
        }
        .header {
            background: var(--tg-theme-bg-color, #fff);
            padding: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 10;
        }
        .header h1 { font-size: 1.2rem; font-weight: 700; }
        .header p { font-size: 0.85rem; color: var(--tg-theme-hint-color, #888); margin-top: 2px; }
        .badge-count {
            background: var(--tg-theme-button-color, #2196F3);
            color: var(--tg-theme-button-text-color, #fff);
            border-radius: 20px; padding: 2px 10px; font-size: 0.8rem;
            display: inline-block; margin-left: 8px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 16px;
        }
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative;
            border: 2px solid transparent;
        }
        .product-card:active { transform: scale(0.97); }
        .product-card.selected {
            border-color: var(--tg-theme-button-color, #2196F3);
            box-shadow: 0 0 0 3px rgba(33,150,243,0.15);
        }
        .product-card .check {
            position: absolute; top: 8px; right: 8px;
            width: 24px; height: 24px;
            background: var(--tg-theme-button-color, #2196F3);
            border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: bold;
        }
        .product-card.selected .check { display: flex; }
        .product-card img {
            width: 100%; height: 140px;
            object-fit: cover; display: block;
        }
        .product-card .img-placeholder {
            width: 100%; height: 140px;
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
        }
        .product-info { padding: 10px; }
        .product-name { font-weight: 600; font-size: 0.9rem; line-height: 1.3; }
        .product-article { font-size: 0.75rem; color: var(--tg-theme-hint-color, #888); margin-top: 2px; }
        .product-price {
            font-size: 0.95rem; font-weight: 700; margin-top: 4px;
            color: var(--tg-theme-button-color, #2196F3);
        }
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--tg-theme-hint-color, #888);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .loading { text-align: center; padding: 60px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: var(--tg-theme-button-color, #2196F3);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 12px 16px;
            background: var(--tg-theme-bg-color, #fff);
            border-top: 1px solid rgba(0,0,0,0.08);
            display: none;
        }
        .btn-submit {
            width: 100%; padding: 14px;
            background: var(--tg-theme-button-color, #2196F3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-submit:active { opacity: 0.85; }
        .spacer { height: 80px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍 Каталог товаров <span class="badge-count" id="selectedCount" style="display:none">0</span></h1>
        <p>Выберите интересующие товары</p>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Загрузка каталога...</p>
    </div>

    <div id="productsGrid" class="products-grid" style="display:none;"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
        <div class="icon">📦</div>
        <p>Каталог пока пуст</p>
    </div>
    <div class="spacer"></div>

    <div class="bottom-bar" id="bottomBar">
        <button class="btn-submit" id="submitBtn" onclick="submitOrder()">
            Отправить заявку
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // API URL - update to match your server
        const API_URL = 'https://wintery-erminia-deducibly.ngrok-free.dev/api/products';

        let products = [];
        let selected = new Set();

        async function loadProducts() {
            try {
                const res = await fetch(API_URL, {
    headers: {
        'ngrok-skip-browser-warning': 'true'
    }
});
                products = await res.json();

                document.getElementById('loading').style.display = 'none';

                if (products.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                renderProducts();
                document.getElementById('productsGrid').style.display = 'grid';
            } catch (e) {
                document.getElementById('loading').innerHTML = '<p style="color:red">Ошибка загрузки 😔</p>';
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card ${selected.has(p.id) ? 'selected' : ''}"
                     id="card-${p.id}" onclick="toggleProduct(${p.id})">
                    <div class="check">✓</div>
                    ${p.photo_url
                        ? `<img src="${p.photo_url}" alt="${p.name}" loading="lazy">`
                        : `<div class="img-placeholder">📦</div>`
                    }
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        ${p.article ? `<div class="product-article">${p.article}</div>` : ''}
                        ${p.price ? `<div class="product-price">${Math.round(p.price).toLocaleString('ru')} ₽</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function toggleProduct(id) {
            if (selected.has(id)) {
                selected.delete(id);
                document.getElementById(`card-${id}`).classList.remove('selected');
            } else {
                selected.add(id);
                document.getElementById(`card-${id}`).classList.add('selected');
            }
            updateUI();
            // Haptic feedback
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function updateUI() {
            const count = selected.size;
            const badge = document.getElementById('selectedCount');
            const bar = document.getElementById('bottomBar');

            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'inline-block';
                bar.style.display = 'block';
                document.getElementById('submitBtn').textContent =
                    `Отправить заявку (${count} ${pluralize(count, 'товар', 'товара', 'товаров')})`;
            } else {
                badge.style.display = 'none';
                bar.style.display = 'none';
            }
        }

        function pluralize(n, one, two, five) {
            if (n % 10 === 1 && n % 100 !== 11) return one;
            if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return two;
            return five;
        }

        function submitOrder() {
            if (selected.size === 0) return;
            const data = { selected_products: Array.from(selected) };
            tg.sendData(JSON.stringify(data));
        }

        loadProducts();
    </script>
</body>
</html>
